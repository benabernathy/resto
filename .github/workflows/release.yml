name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure cross-compilation
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf resto-${{ github.ref_name }}-${{ matrix.target }}.tar.gz resto
          mv resto-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ../../../

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        run: |
          cd target/${{ matrix.target }}/release
          Compress-Archive -Path resto.exe -DestinationPath ../../../resto-${{ github.ref_name }}-${{ matrix.target }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: resto-${{ matrix.target }}
          path: resto-${{ github.ref_name }}-${{ matrix.target }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            resto-x86_64-unknown-linux-gnu/resto-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz
            resto-aarch64-unknown-linux-gnu/resto-${{ github.ref_name }}-aarch64-unknown-linux-gnu.tar.gz
            resto-x86_64-apple-darwin/resto-${{ github.ref_name }}-x86_64-apple-darwin.tar.gz
            resto-aarch64-apple-darwin/resto-${{ github.ref_name }}-aarch64-apple-darwin.tar.gz
            resto-x86_64-pc-windows-msvc/resto-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip
          generate_release_notes: true
